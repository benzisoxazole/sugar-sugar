  faq:
    title: "Часто задаваемые вопросы"
    sections:
      - title: "Почему это исследование важно"
        items:
          - q: "Что такое Sugar Sugar?"
            a: "Sugar Sugar — это веб-приложение для исследований, созданное на базе Dash. Оно превращает прогнозирование глюкозы в интерактивную игру: вы видите часть графика CGM, рисуете, как он будет продолжаться, а затем сравниваете свой прогноз с реальными значениями. Цель — измерить, насколько точно люди могут предвидеть краткосрочную динамику глюкозы."
          - q: "Это настоящее научное исследование?"
            a: "Да. Sugar Sugar является частью реального научного проекта. Исследование получило одобрение Комитета по этике Университетской медицины Ростока (Universitätsmedizin Rostock) в Германии. Мы упоминаем об этом, чтобы вы знали, что исследование проводится ответственно."
          - q: "Почему предсказание глюкозы важно для людей с диабетом?"
            a: "Для людей с диабетом точные краткосрочные прогнозы глюкозы могут помочь в принятии более безопасных повседневных решений относительно инсулина, углеводов, физических упражнений и времени. Лучшее предсказание может помочь уменьшить опасные скачки и падения и сделать управление глюкозой менее стрессовым."
          - q: "Почему предсказание глюкозы важно для людей без диабета?"
            a: "Глюкоза — это ключевой метаболический сигнал, связанный с энергией, когницией, настроением, реакцией на упражнения и долгосрочным здоровьем. Для людей без диабета прогнозирование может показать, как еда, сон, стресс и активность влияют на метаболизм в реальном времени — это полезно для профилактики и оптимизации образа жизни."
          - q: "Почему человеческая точность так важна для машинного обучения?"
            a: "В настоящее время не существует опубликованного человеческого базового уровня точности для прогнозирования глюкозы CGM. Не зная, насколько хорошо информированный человек может предсказывать тренды глюкозы, мы не можем оценить, действительно ли полезна какая-либо модель ML — она может быть хуже опытного диабетика или лучше только в определенных сценариях. Это исследование устанавливает этот базовый уровень, чтобы будущие работы по ML можно было сравнивать осмысленно."
      - title: "Как работает исследование"
        items:
          - q: "Кто может участвовать?"
            a: "Любой человек старше 18 лет. Пользователи CGM особенно ценны, но люди без CGM также могут играть, используя общие данные."
          - q: "Какие устройства CGM и форматы поддерживаются?"
            a: "Поддерживаются экспорты из Dexcom, Libre, Medtronic и Nightscout. Также доступен общий пример данных, если у вас нет устройства CGM."
          - q: "Сколько времени это занимает?"
            a: "Каждый раунд занимает около 2–3 минут. Полная сессия (12 раундов) длится около 30 минут, но вы можете разделить её на несколько посещений."
          - q: "Могу ли я остановиться на полпути и продолжить позже?"
            a: "Да. Игра сохраняет ваш прогресс локально в браузере. Если 12 раундов кажутся слишком большим за один раз, закройте вкладку и вернитесь позже — вам будет предложено продолжить с того места, где вы остановились. Даже несколько раундов полезны, но каждый дополнительный раунд улучшает качество данных."
          - q: "Что если мне не нравятся мои результаты? Стоит ли мне начать сначала?"
            a: "Пожалуйста, не начинайте сначала только потому, что вы недовольны своей точностью. Люди естественным образом склонны сохранять хорошие результаты и отбрасывать плохие, но это исказит исследование и сделает результаты менее научно обоснованными. Если вы чувствуете разочарование, лучше продолжить следующий раунд, а не сбрасывать прогресс."
          - q: "Какие используются показатели точности?"
            a: "Мы используем стандартные метрики прогнозирования — MAE, RMSE и MAPE — для количественной оценки того, насколько близко ваша предсказанная кривая глюкозы была к реальной. MAE — это средняя абсолютная ошибка: она говорит о том, насколько вы ошибались в среднем. RMSE более строго наказывает за крупные ошибки, подчеркивая случаи, когда прогноз был совсем неверным. MAPE выражает ошибку в процентах, что помогает сравнивать результаты в разных диапазонах глюкозы. Вместе эти метрики дают более полную картину, чем один показатель."
      - title: "Данные и конфиденциальность"
        items:
          - q: "Сохраняются ли мои данные?"
            a: "Пока вы не решите отправить результаты, всё остается в вашем браузере. Ничего не отправляется на наши серверы, пока вы не дадите активное согласие и не нажмете кнопку отправки. Если вы выберете «Я хочу только поиграть», никакие данные не покинут ваше устройство."
          - q: " какие данные собираются, если я дам согласие?"
            a: "Данные игры (нарисованные предсказания, показатели точности), по желанию — ваш загруженный файл CGM и короткая анкета (возраст, опыт работы с CGM, статус диабета и т. д.)."
          - q: "Передаются ли мои данные CGM третьим лицам?"
            a: "Нет. Данные используются исключительно для этого исследования и никогда не продаются и не передаются неавторизованным лицам."
          - q: "Могу ли я отказаться от участия?"
            a: "Да, в любое время, просто закрыв браузер. Чтобы удалить уже отправленные данные, пожалуйста, свяжитесь с командой исследования."
          - q: "Что мешает участникам подделывать результаты?"
            a: "Честно говоря? Ничего технического. Поскольку все данные хранятся локально в вашем браузере, мы полностью полагаемся на честность и добросовестность участников — и искренне доверяем вам. Тем не менее, если вы очень хотите похвастаться перед друзьями подозрительно идеальным результатом, просто сделайте скриншот и отредактируйте его в графическом редакторе, или воспользуйтесь DevTools браузера для изменения отображаемых чисел. Пожалуйста, не отправляйте поддельные данные в исследование — это напрямую вредит научной достоверности работы, от которой выигрывают все."
      - title: "Помощь и вклад в проект"
        items:
          - q: "Что делать, если я нашел ошибку?"
            a: "Пожалуйста, откройте тикет на GitHub проекта по адресу [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Отчеты об ошибках очень помогают в улучшении приложения и выявлении всего, что может повлиять на ход исследования или качество данных."
          - q: "Я разработчик ПО. Могу ли я добавить функцию?"
            a: "Да, вклад приветствуется через GitHub проекта по адресу [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Мы особенно приветствуем исправления, улучшения пользовательского интерфейса, поддержку большего количества датчиков или форматов файлов и другие изменения, которые улучшают удобство использования без изменения научного протокола. Поскольку это активное исследование, изменения, влияющие на дизайн исследования, следует сначала обсудить с командой."
          - q: "Как еще я могу помочь исследованию?"
            a: "Даже если вы не разработчик, вы все равно можете очень помочь. Поделитесь ссылкой на исследование в соответствующих сообществах, расскажите о нем другим пользователям CGM или заинтересованным людям, сообщайте о неясных формулировках или проблемах с удобством использования и связывайтесь с командой исследования через каналы связи проекта, если вы хотите сотрудничать."
          - q: "Где я могу найти полный дизайн исследования?"
            a: "На странице «Исследование» в навигационной панели, которая содержит ссылку на скачивание PDF и ссылку на репозиторий GitHub."