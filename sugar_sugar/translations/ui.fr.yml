  faq:
    title: "Foire Aux Questions (FAQ)"
    sections:
      - title: "Pourquoi cette étude est importante"
        items:
          - q: "Qu'est-ce que Sugar Sugar ?"
            a: "Sugar Sugar est une application de recherche en ligne construite avec Dash. Elle transforme la prévision du glucose en un jeu interactif : vous voyez une partie d'une trace CGM, vous dessinez comment vous pensez qu'elle va continuer, puis vous comparez votre prédiction avec les valeurs réelles. L'objectif est de mesurer la précision avec laquelle les humains peuvent anticiper la dynamique du glucose à court terme."
          - q: "S'agit-il d'une véritable étude de recherche ?"
            a: "Oui. Sugar Sugar fait partie d'un véritable effort de recherche. L'étude a reçu l'autorisation du comité d'éthique de l'University Medicine Rostock (Universitätsmedizin Rostock) en Allemagne — nous le mentionnons dans le cadre du contexte de l'étude afin que vous sachiez que la recherche est menée de manière responsable."
          - q: "Pourquoi la prédiction du glucose est-elle importante pour les personnes diabétiques ?"
            a: "Pour les personnes diabétiques, des prévisions de glucose précises à court terme peuvent faciliter des décisions quotidiennes plus sûres concernant l'insuline, les glucides, l'exercice et le calendrier. Une meilleure prédiction peut aider à réduire les hauts et les bas dangereux et rendre la gestion du glucose moins stressante."
          - q: "Pourquoi la prédiction du glucose est-elle importante pour les personnes non diabétiques ?"
            a: "Le glucose est un signal métabolique central lié à l'énergie, à la cognition, à l'humeur, à la réponse à l'exercice et à la santé à long terme. Pour les personnes non diabétiques, la prédiction peut révéler comment l'alimentation, le sommeil, le stress et l'activité façonnent le métabolisme en temps réel — utile pour la santé préventive et l'optimisation du mode de vie."
          - q: "Pourquoi la précision humaine est-elle si importante pour l'apprentissage automatique (ML) ?"
            a: "Il n'existe actuellement aucun benchmark publié de base humaine pour la prédiction du glucose CGM. Sans savoir si un humain informé peut prédire les tendances du glucose, nous ne pouvons pas évaluer si un modèle ML est réellement utile — il pourrait être moins bon qu'un diabétique averti, ou meilleur seulement dans des scénarios spécifiques. Cette étude établit cette base de référence afin que les futurs travaux de ML puissent être comparés de manière significative."
      - title: "Comment fonctionne l'étude"
        items:
          - q: "Qui peut participer ?"
            a: "Toute personne de 18 ans et plus. Les utilisateurs de CGM sont particulièrement précieux, mais les non-utilisateurs de CGM peuvent également jouer avec des données génériques."
          - q: "Quels appareils et formats CGM sont pris en charge ?"
            a: "Les exports Dexcom, Libre, Medtronic et Nightscout sont pris en charge. Un ensemble de données d'exemple générique est également disponible si vous n'avez pas d'appareil CGM."
          - q: "Combien de temps cela prend-il ?"
            a: "Chaque manche prend environ 2 à 3 minutes. Une session complète (12 manches) dure environ 30 minutes, mais vous pouvez la répartir sur plusieurs visites."
          - q: "Puis-je m'arrêter en cours de route et reprendre plus tard ?"
            a: "Oui. Le jeu enregistre votre progression localement dans le navigateur. Si 12 manches vous semblent trop lourdes en une seule séance, fermez l'onglet et revenez plus tard — on vous proposera de continuer là où vous vous étiez arrêté. Quelques manches suffisent à être utiles, mais chaque manche supplémentaire améliore la qualité des données."
          - q: "Et si je n'aime pas mes résultats ? Dois-je recommencer ?"
            a: "Veuillez ne pas recommencer simplement parce que vous n'êtes pas satisfait de votre précision. Les gens préfèrent naturellement garder les bons scores et écarter les mauvais, mais cela fausserait l'étude et rendrait les résultats moins valables scientifiquement. Si vous vous sentez déçu, la meilleure chose à faire est de continuer avec une autre manche plutôt que de réinitialiser votre progression."
          - q: "Quelles sont les métriques de précision ?"
            a: "Nous utilisons des métriques de prévision standard — MAE, RMSE et MAPE — pour quantifier la proximité de votre courbe de glucose prédite par rapport à la courbe réelle. La MAE est l'erreur absolue moyenne : elle vous indique de combien vous vous êtes trompé en moyenne. La RMSE pénalise plus fortement les erreurs plus importantes, elle met donc en évidence les cas où la prédiction était très erronée. La MAPE exprime l'erreur en pourcentage, ce qui aide à comparer les performances sur différentes plages de glucose. Ensemble, ces mesures donnent une image plus complète qu'un score unique."
      - title: "Données et confidentialité"
        items:
          - q: "Mes données sont-elles stockées ?"
            a: "Tant que vous ne choisissez pas de soumettre, tout reste dans votre propre navigateur. Rien n'est envoyé à nos serveurs à moins que vous ne consentiez activement et que vous ne soumettiez vos résultats. Si vous sélectionnez \"Je veux seulement jouer\", aucune donnée ne quitte jamais votre appareil."
          - q: "Quelles données sont collectées si je consens ?"
            a: "Données de jeu (prédictions tracées, mesures de précision), éventuellement votre fichier CGM téléchargé et un court questionnaire (âge, expérience CGM, statut diabétique, etc.)."
          - q: "Mes données CGM sont-elles partagées avec des tiers ?"
            a: "Non. Les données sont utilisées uniquement pour cette étude et ne sont jamais vendues ou partagées avec des tiers non autorisés."
          - q: "Puis-je me retirer ?"
            a: "Oui, à tout moment en fermant le navigateur. Pour faire supprimer les données déjà soumises, veuillez contacter l'équipe de l'étude."
          - q: "Qu'est-ce qui empêche quelqu'un de falsifier ses résultats ?"
            a: "Honnêtement ? Rien de technique. Puisque toutes les données résident dans le stockage local de votre propre navigateur, nous comptons entièrement sur l'honnêteté et la bonne foi des participants — et nous vous faisons sincèrement confiance. Cela dit, si vous voulez vraiment impressionner vos amis avec un score de prédiction suspicieusement parfait, faites simplement une capture d'écran et retouchez-la dans un éditeur d'images, ou utilisez les DevTools de votre navigateur pour modifier les chiffres affichés. Veuillez ne pas soumettre de fausses données à l'étude — cela nuit directement à la validité scientifique de la recherche dont tout le monde bénéficie."
      - title: "Aide et contribution"
        items:
          - q: "Et si j'ai trouvé un bug ?"
            a: "Veuillez ouvrir un ticket sur le GitHub du projet à l'adresse [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Les rapports de bugs sont très utiles pour améliorer l'application et pour identifier tout ce qui pourrait affecter l'expérience de l'étude ou la qualité des données."
          - q: "Je suis un développeur de logiciels. Puis-je contribuer à une fonctionnalité ?"
            a: "Oui, les contributions sont les bienvenues via le GitHub du projet à l'adresse [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Nous accueillons particulièrement les corrections, les améliorations de l'interface utilisateur, le support de nouveaux capteurs ou formats de fichiers, et d'autres changements qui améliorent la convivialité sans modifier le protocole scientifique. Comme il s'agit d'une étude active, les changements qui affectent la conception de l'étude en cours de route — comme de nouveaux champs de questionnaire ou des modifications de la tâche principale — doivent d'abord être discutés avec l'équipe."
          - q: "Comment puis-je aider l'étude d'une autre manière ?"
            a: "Même si vous n'êtes pas un développeur de logiciels, vous pouvez quand même beaucoup aider. Partagez l'étude avec les communautés concernées, informez d'autres utilisateurs de CGM ou des personnes intéressées, signalez les formulations peu claires ou les problèmes de convivialité, et contactez l'équipe de l'étude via les canaux de contact du projet si vous souhaitez collaborer de quelque manière que ce soit."
          - q: "Où puis-je trouver la conception complète de l'étude ?"
            a: "Sur la page \"L'Étude\" dans la barre de navigation, qui comprend un téléchargement PDF et un lien vers le dépôt GitHub."
