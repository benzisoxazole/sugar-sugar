  faq:
    title: "Preguntas frecuentes (FAQ)"
    sections:
      - title: "Por qué es importante este estudio"
        items:
          - q: "¿Qué es Sugar Sugar?"
            a: "Sugar Sugar es una aplicación de investigación basada en la web construida con Dash. Convierte la previsión de glucosa en un juego interactivo: ves parte de un rastro de CGM, dibujas cómo crees que continuará y luego comparas tu predicción con los valores reales. El objetivo es medir con qué precisión pueden los humanos anticipar la dinámica de la glucosa a corto plazo."
          - q: "¿Es este un estudio de investigación real?"
            a: "Sí. Sugar Sugar es parte de un esfuerzo de investigación real. El estudio recibió la aprobación del comité de ética de University Medicine Rostock (Universitätsmedizin Rostock) en Alemania; mencionamos esto como parte del contexto del estudio para que sepa que la investigación se lleva a cabo de manera responsable."
          - q: "¿Por qué es importante predecir la glucosa para las personas con diabetes?"
            a: "Para las personas con diabetes, las previsiones precisas de glucosa a corto plazo pueden ayudar a tomar decisiones diarias más seguras sobre la insulina, los carbohidratos, el ejercicio y los horarios. Una mejor predicción puede ayudar a reducir los picos y caídas peligrosas y hacer que el control de la glucosa sea menos estresante."
          - q: "¿Por qué es importante predecir la glucosa para las personas sin diabetes?"
            a: "La glucosa es una señal metabólica central vinculada a la energía, la cognición, el estado de ánimo, la respuesta al ejercicio y la salud a largo plazo. Para las personas no diabéticas, la predicción puede revelar cómo la comida, el sueño, el estrés y la actividad moldean el metabolismo en tiempo real, lo cual es útil para la salud preventiva y la optimización del estilo de vida."
          - q: "¿Por qué es tan importante la precisión humana para el aprendizaje automático (ML)?"
            a: "Actualmente no existe una referencia publicada de base humana para la predicción de glucosa CGM. Sin saber qué tan bien puede predecir la glucosa un humano informado, no podemos evaluar si algún modelo de ML es genuinamente útil; podría ser peor que un diabético con conocimientos, o mejor solo en escenarios específicos. Este estudio establece esa base para que el futuro trabajo de ML pueda compararse de manera significativa."
      - title: "Cómo funciona el estudio"
        items:
          - q: "¿Quién puede participar?"
            a: "Cualquier persona mayor de 18 años. Los usuarios de CGM son especialmente valiosos, pero los que no usan CGM también pueden jugar con datos genéricos."
          - q: "¿Qué dispositivos y formatos de CGM son compatibles?"
            a: "Se admiten exportaciones de Dexcom, Libre, Medtronic y Nightscout. También hay un conjunto de datos de muestra genérico disponible si no tienes un dispositivo CGM."
          - q: "¿Cuánto tiempo se tarda?"
            a: "Cada ronda dura unos 2-3 minutos. Una sesión completa (12 rondas) dura unos 30 minutos, pero puedes dividirla en varias visitas."
          - q: "¿Puedo parar a mitad de camino y reanudarlo más tarde?"
            a: "Sí. El juego guarda tu progreso localmente en el navegador. Si 12 rondas te parecen demasiado para una sola sesión, cierra la pestaña y vuelve más tarde: se te ofrecerá continuar desde donde lo dejaste. Unas pocas rondas ya son útiles, pero cada ronda extra mejora la calidad de los datos."
          - q: "¿Qué pasa si no me gustan mis resultados? ¿Debo reiniciar?"
            a: "Por favor, no reinicies solo porque no estés satisfecho con tu precisión. La gente prefiere naturalmente quedarse con las puntuaciones buenas y descartar las malas, pero eso sesgaría el estudio y haría que los resultados fueran menos válidos desde el punto de vista científico. Si te sientes decepcionado, lo mejor es continuar con otra ronda en lugar de reiniciar tu progreso."
          - q: "¿Cuáles son las métricas de precisión?"
            a: "Utilizamos métricas de previsión estándar (MAE, RMSE y MAPE) para cuantificar qué tan cerca estuvo tu curva de glucosa predicha de la real. El MAE es el error absoluto medio: te indica cuánto te equivocaste de media. El RMSE penaliza más fuertemente los errores más grandes, por lo que resalta los casos en los que la predicción fue muy errónea. El MAPE expresa el error como un porcentaje, lo que ayuda a comparar el rendimiento en diferentes rangos de glucosa. Juntas, estas métricas dan una imagen más completa que una sola puntuación."
      - title: "Datos y privacidad"
        items:
          - q: "¿Se almacena alguno de mis datos?"
            a: "Hasta que elijas enviar, todo se queda en tu propio navegador. No se envía nada a nuestros servidores a menos que des tu consentimiento activo y envíes los resultados. Si seleccionas \"Solo quiero jugar\", ningún dato sale nunca de tu dispositivo."
          - q: "¿Qué datos se recopilan si doy mi consentimiento?"
            a: "Datos de juego (predicciones dibujadas, métricas de precisión), opcionalmente tu archivo CGM subido y un cuestionario corto (edad, experiencia con CGM, estado de la diabetes, etc.)."
          - q: "¿Se comparten mis datos de CGM con terceros?"
            a: "No. Los datos se utilizan únicamente para este estudio y nunca se venden ni se comparten con terceros no autorizados."
          - q: "¿Puedo retirarme?"
            a: "Sí, en cualquier momento cerrando el navegador. Para que se eliminen los datos ya enviados, ponte en contacto con el equipo del estudio."
          - q: "¿Qué impide que alguien falsifique sus resultados?"
            a: "¿Honestamente? Nada técnico. Como todos los datos viven en el almacenamiento local de tu propio navegador, dependemos completamente de la honestidad y buena fe de los participantes — y confiamos genuinamente en ti. Dicho esto, si realmente quieres impresionar a tus amigos con una puntuación sospechosamente perfecta, por favor simplemente toma una captura de pantalla y edítala en un editor de imágenes, o usa las DevTools de tu navegador para cambiar los números que se muestran. Por favor, no envíes datos falsos al estudio — eso daña directamente la validez científica de la investigación de la que todos se benefician."
      - title: "Ayuda y contribuciones"
        items:
          - q: "¿Qué pasa si encuentro un error?"
            a: "Por favor, abre una incidencia en el GitHub del proyecto en [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Los informes de errores son muy útiles para mejorar la aplicación y para identificar cualquier cosa que pueda afectar la experiencia del estudio o la calidad de los datos."
          - q: "Soy desarrollador de software. ¿Puedo contribuir con alguna función?"
            a: "Sí, las contribuciones son bienvenidas a través del GitHub del proyecto en [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Agradecemos especialmente los arreglos, las mejoras de la interfaz de usuario, el soporte para más sensores o formatos de archivos y otros cambios que mejoren la usabilidad sin alterar el protocolo científico. Al tratarse de un estudio activo, los cambios que afecten al diseño del estudio a mitad de camino (como nuevos campos del cuestionario o modificaciones de la tarea principal) deben consultarse primero con el equipo."
          - q: "¿Cómo más puedo ayudar al estudio?"
            a: "Aunque no seas desarrollador de software, puedes ayudar mucho. Comparte el estudio con las comunidades relevantes, cuéntaselo a otros usuarios de CGM o personas interesadas, informa de redacciones poco claras o problemas de usabilidad, y ponte en contacto con el equipo del estudio a través de los canales de contacto del proyecto si deseas colaborar de alguna manera."
          - q: "¿Dónde puedo encontrar el diseño completo del estudio?"
            a: "En la página \"El Estudio\" de la barra de navegación, que incluye una descarga en PDF y un enlace al repositorio de GitHub."
