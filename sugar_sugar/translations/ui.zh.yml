  faq:
    title: "常见问题"
    sections:
      - title: "为什么这项研究很重要"
        items:
          - q: "什么是 Sugar Sugar？"
            a: "Sugar Sugar 是一款基于 Dash 构建的网络研究应用程序。它将血糖预测变成了一个互动游戏：您可以看到一部分 CGM 曲线，画出您认为它将如何继续，然后将您的预测与真实值进行比较。目标是衡量人类预测短期血糖动态的准确性。"
          - q: "这是一项真实的研究吗？"
            a: "是的。Sugar Sugar 是真实研究项目的一部分。该研究获得了罗斯托克大学医学中心（Universitätsmedizin Rostock）伦理委员会的批准——我们提及这一点是为了让您知道研究是以负责任的方式进行的。"
          - q: "为什么预测血糖对糖尿病患者很重要？"
            a: "对于糖尿病患者来说，准确的短期血糖预测可以支持关于胰岛素、碳水化合物、运动和时机的更安全的日常决策。更好的预测可以帮助减少危险的高血糖和低血糖，并减轻血糖管理的压力。"
          - q: "为什么预测血糖对非糖尿病患者很重要？"
            a: "血糖是与能量、认知、情绪、运动反应和长期健康相关的核心代谢信号。对于非糖尿病患者，预测可以实时揭示食物、睡眠、压力和活动如何影响代谢——对预防性健康和生活方式优化很有用。"
          - q: "为什么人类预测准确性对机器学习如此重要？"
            a: "目前尚无已发表的关于 CGM 血糖预测的人类基准。如果不了解一个知情的人预测血糖趋势的表现如何，我们就无法评估任何机器学习模型是否真正有用——它可能比博学的糖尿病患者更差，或者仅在特定场景下更好。这项研究建立了这一基准，以便未来的机器学习工作可以进行有意义的比较。"
      - title: "研究如何运作"
        items:
          - q: "谁可以参与？"
            a: "任何 18 岁以上的人。CGM 用户特别有价值，但非 CGM 用户也可以使用通用数据进行游戏。"
          - q: "支持哪些 CGM 设备和格式？"
            a: "支持 Dexcom、Libre、Medtronic 和 Nightscout 导出格式。如果您没有 CGM 设备，也可以使用通用示例数据集。"
          - q: "需要多长时间？"
            a: "每轮大约需要 2-3 分钟。完整的一节（12 轮）大约需要 30 分钟，但您可以分多次完成。"
          - q: "我可以中途停止并稍后继续吗？"
            a: "是的。游戏会本地保存在浏览器中。如果一次完成 12 轮感觉太累，请关闭标签页稍后再回来——系统会提示您从上次离开的地方继续。哪怕只参与几轮也是有用的，但每一轮额外的参与都会提高数据质量。"
          - q: "如果我不喜欢我的结果怎么办？我应该重新开始吗？"
            a: "请不要仅仅因为对自己的准确度不满意就重新开始。人们自然倾向于保留好的分数而舍弃差的分数——但这会扭曲研究并使结果的科学有效性降低。如果您感到失望，最好的做法是继续下一轮，而不是重置您的进度。"
          - q: "有哪些准确性指标？"
            a: "我们使用标准的预测指标——MAE、RMSE 和 MAPE — 来量化您的预测血糖曲线与真实曲线的接近程度。MAE 是平均绝对误差：它告诉您平均偏差是多少。RMSE 对较大错误的惩罚更重，因此它突出了预测严重错误的情况。MAPE 将误差表示为百分比，这有助于比较不同血糖范围内的表现。这些指标共同构成了一个比单一分数更完整的画面。"
      - title: "数据与隐私"
        items:
          - q: "我的数据会被存储吗？"
            a: "在您选择提交之前，一切都保留在您自己的浏览器中。除非您主动同意并提交结果，否则不会有任何数据发送到我们的服务器。如果您选择“我只想玩”，则数据永远不会离开您的设备。"
          - q: "如果我同意，会收集哪些数据？"
            a: "游戏数据（画出的预测、准确性指标），可选的您上传的 CGM 文件，以及一份简短的调查问卷（年龄、CGM 经验、糖尿病状态等）。"
          - q: "我的 CGM 数据会与第三方共享吗？"
            a: "不会。数据仅用于本研究，绝不会出售或与未经授权的各方共享。"
          - q: "我可以退出吗？"
            a: "可以，随时关闭浏览器即可。若要删除已提交的数据，请联系研究团队。"
          - q: "有什么能阻止参与者伪造结果吗？"
            a: "说实话？技术上什么都阻止不了。由于所有数据都存储在您自己浏览器的本地存储中，我们完全依赖参与者的诚实和善意——我们真诚地信任您。话虽如此，如果您真的想用一个可疑的完美预测分数来给朋友留下印象，请直接截图并在图像编辑器中修改，或者使用浏览器的开发者工具更改显示的数字。请不要向研究提交虚假数据——这会直接损害研究的科学有效性，而这项研究对所有人都有益。"
      - title: "帮助与贡献"
        items:
          - q: "如果我发现了 Bug 怎么办？"
            a: "请在项目的 GitHub 上提交 issue：[github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar)。Bug 报告对于改进应用程序以及识别任何可能影响研究体验或数据质量的问题非常有帮助。"
          - q: "我是软件开发人员。我可以贡献功能吗？"
            a: "可以，欢迎通过项目的 GitHub 贡献代码：[github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar)。我们特别欢迎错误修复、UI 改进、对更多传感器或文件格式的支持，以及其他在不改变科学方案的情况下提高可用性的更改。由于这是一项正在进行的研究，影响研究设计的重大更改应首先与团队讨论。"
          - q: "我还能如何帮助这项研究？"
            a: "即使您不是软件开发人员，也可以提供很大帮助。在相关的社区分享这项研究，告诉其他 CGM 用户或感兴趣的人，报告不清晰的措辞或可用性问题，如果您想以任何方式合作，请通过项目的联系渠道联系研究团队。"
          - q: "我在哪里可以找到完整的研究设计？"
            a: "在导航栏的“研究项目”页面上，其中包括 PDF 下载和 GitHub 存储库链接。"