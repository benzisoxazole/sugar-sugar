  faq:
    title: "Часті запитання"
    sections:
      - title: "Чому це дослідження важливе"
        items:
          - q: "Що таке Sugar Sugar?"
            a: "Sugar Sugar — це веб-застосунок для досліджень, побудований на Dash. Він перетворює прогнозування глюкози на інтерактивну гру: ти бачиш частину CGM-кривої, малюєш, як вона продовжиться, і порівнюєш прогноз із реальними значеннями. Мета — виміряти, наскільки точно люди можуть передбачати короткострокову динаміку глюкози."
          - q: "Це справжнє наукове дослідження?"
            a: "Так. Sugar Sugar є частиною реального дослідницького проєкту. Дослідження отримало дозвіл Комітету з етики Університетської медицини Ростока (Universitätsmedizin Rostock) в Німеччині — ми згадуємо це як частину контексту дослідження, щоб ти знав/ла, що воно проводиться відповідально."
          - q: "Чому прогнозування глюкози важливе для людей із діабетом?"
            a: "Для людей із діабетом точні короткострокові прогнози глюкози можуть підтримувати безпечніші повсякденні рішення щодо інсуліну, вуглеводів, фізичної активності та тайміngу. Кращий прогноз допомагає зменшити небезпечні підйоми та падіння і зробити управління глюкозою менш стресовим."
          - q: "Чому прогнозування глюкози важливе для людей без діабету?"
            a: "Глюкоза — це ключовий метаболічний сигнал, повʼязаний із енергією, когніцією, настроєм, реакцією на фізичні навантаження та довгостроковим здоровʼям. Для людей без діабету прогнозування може розкрити, як їжа, сон, стрес і активність впливають на метаболізм у реальному часі — це корисно для профілактики та оптимізації способу життя."
          - q: "Чому точність людини така важлива для машинного навчання?"
            a: "Наразі не існує опублікованого еталонного показника точності людини для прогнозування CGM-глюкози. Без розуміння того, наскільки добре поінформована людина може прогнозувати тренди глюкози, неможливо оцінити, чи справді корисна будь-яка модель ШІ — вона може бути гіршою за досвідченого діабетика або кращою лише в певних сценаріях. Це дослідження встановлює такий еталон, щоб майбутні моделі ШІ можна було порівнювати осмислено."
      - title: "Як проводиться дослідження"
        items:
          - q: "Хто може брати участь?"
            a: "Усі 18+. Користувачі CGM особливо цінні, але люди без CGM також можуть грати з генеричними даними."
          - q: "Які CGM-пристрої та формати підтримуються?"
            a: "Підтримуються Dexcom, Libre, Medtronic і Nightscout. Також доступний загальний приклад набору даних, якщо у тебе немає CGM-пристрою."
          - q: "Скільки часу це займає?"
            a: "Кожен раунд займає приблизно 2–3 хвилини. Повна сесія (12 раундів) — близько 30 хвилин, але її можна розбити на кілька відвідувань."
          - q: "Чи можу я зупинитися посередині і продовжити пізніше?"
            a: "Так. Гра зберігає твій прогрес локально в браузері. Якщо 12 раундів здаються забагато за один раз — закрий вкладку і повернися пізніше, тобі запропонують продовжити з того місця. Навіть кілька раундів корисні, але кожен додатковий раунд покращує якість даних."
          - q: "Що, якщо мені не подобаються мої результати? Чи варто починати заново?"
            a: "Будь ласка, не починай заново лише тому, що тебе не влаштовує точність. Люди природно схильні зберігати хороші результати й відкидати погані — але це спотворить дослідження і зробить результати менш науково валідними. Найкраще — продовжити наступним раундом, а не скидати прогрес."
          - q: "Які метрики точності використовуються?"
            a: "Ми використовуємо стандартні метрики прогнозування — MAE, RMSE і MAPE — щоб виміряти, наскільки твоя передбачена крива глюкози відповідала реальній. MAE — середня абсолютна похибка: показує, наскільки ти помилявся/лась у середньому. RMSE сильніше штрафує великі помилки, виділяючи випадки, де прогноз був дуже невірним. MAPE виражає похибку у відсотках, що зручно для порівняння в різних діапазонах глюкози. Разом ці метрики дають повнішу картину, ніж один показник."
      - title: "Дані та конфіденційність"
        items:
          - q: "Чи зберігаються мої дані?"
            a: "Поки ти не вирішиш надіслати результати, все залишається у твоєму власному браузері. Нічого не надсилається на наші сервери без твоєї активної згоди. Якщо ти обрав/ла \"Я хочу лише пограти\" — дані не залишають твій пристрій."
          - q: "Які дані збираються при згоді?"
            a: "Ігрові дані (намальовані прогнози, метрики точності), за бажанням — завантажений CGM-файл, а також коротка анкета (вік, досвід із CGM, статус діабету тощо)."
          - q: "Чи передаються мої CGM-дані третім особам?"
            a: "Ні. Дані використовуються виключно для цього дослідження і ніколи не продаються та не передаються неавторизованим особам."
          - q: "Чи можу я відмовитися від участі?"
            a: "Так, будь-коли — просто закрий браузер. Щоб видалити вже надіслані дані, зверніться до команди дослідження."
          - q: "Що заважає учасникам підробляти результати?"
            a: "Чесно кажучи? Нічого технічного. Оскільки всі дані зберігаються локально у твоєму браузері, ми цілком покладаємося на чесність і добру волю учасників — і справді довіряємо тобі. Якщо ти все ж хочеш похвалитися перед друзями підозріло ідеальним результатом, будь ласка, просто зроби скріншот і відредагуй його в графічному редакторі, або скористайся DevTools браузера для зміни відображуваних чисел. Будь ласка, не надсилай до дослідження підроблені дані — це безпосередньо шкодить науковій цінності дослідження, від якого виграють усі."
      - title: "Допомога та участь"
        items:
          - q: "Що, якщо я знайшов/ла помилку?"
            a: "Будь ласка, відкрий issue на GitHub проєкту: [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Звіти про помилки дуже корисні для покращення застосунку та виявлення всього, що може вплинути на досвід участі або якість даних."
          - q: "Я розробник(ця) програмного забезпечення. Чи можу я додати функцію?"
            a: "Так, внески вітаються через GitHub проєкту: [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Ми особливо раді виправленням помилок, покращенням UI, підтримці більшої кількості сенсорів або форматів файлів та іншим змінам, що покращують зручність без зміни наукового протоколу. Оскільки дослідження активне, зміни, що впливають на дизайн дослідження, варто спочатку обговорити з командою."
          - q: "Як ще я можу допомогти дослідженню?"
            a: "Навіть якщо ти не розробник(ця), ти можеш багато зробити. Поділись дослідженням із відповідними спільнотами, розкажи про нього іншим користувачам CGM або зацікавленим людям, повідом про незрозумілі формулювання чи проблеми зручності використання, або звʼяжись із командою дослідження через контактні канали проєкту."
          - q: "Де знайти повний дизайн дослідження?"
            a: "На сторінці \"Дослідження\" у навігаційному меню — там є посилання для завантаження PDF та посилання на репозиторій GitHub."

